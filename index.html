<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Appel à Collaboration — Cabinet EducTech Consulting</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --blue: #0B87DC;
    --orange: #F1810F;
    --navy: #0A1830;
    --white: #FFFFFF;
    --paper: #FAFBFD;
  }

  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{ background: var(--white); color: var(--navy); font-family:'Inter', sans-serif; -webkit-font-smoothing:antialiased; }

  /* ---------- NAV ---------- */
  nav{
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 24px;
    background: #FFFFFF;
    border-bottom: 1px solid rgba(10,24,48,0.08);
  }
  nav img{ height: 30px; display:block; }
  nav .nav-cta{
    font-size: 0.85rem; font-weight:700; color: #fff; background: var(--orange);
    padding: 9px 18px; border-radius: 30px; cursor:pointer; border:none;
    transition: transform 0.15s ease;
  }
  nav .nav-cta:hover{ transform: translateY(-2px); }

  /* ---------- HERO ---------- */
  .hero{
    position:relative; min-height: 92vh;
    display:flex; align-items:center; justify-content:center;
    padding: 60px 24px; text-align:center; overflow:hidden; color:#fff;
  }
  .hero-bg{
    position:absolute; inset:0; z-index:0;
    background-image:
      linear-gradient(180deg, rgba(10,24,48,0.88) 0%, rgba(10,24,48,0.80) 55%, rgba(10,24,48,0.94) 100%),
      url('https://images.unsplash.com/photo-1505373877841-8d25f7d46678?fm=jpg&q=70&w=2000&auto=format&fit=crop');
    background-size: cover; background-position: center;
  }
  .hero-inner{ position:relative; z-index:1; max-width: 800px; }

  .eyebrow{
    display:inline-flex; align-items:center; gap:9px;
    font-size: 12.5px; letter-spacing: 0.16em; text-transform:uppercase; font-weight:700;
    color: #FFC98A;
    border: 1px solid rgba(241,129,15,0.5);
    background: rgba(241,129,15,0.12);
    padding: 8px 18px 8px 14px; border-radius: 30px; margin-bottom: 26px;
    opacity:0; animation: fadeUp 0.7s ease 0.05s forwards;
  }
  .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background: var(--orange); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1; } 50%{ transform:scale(1.6); opacity:0.5; } }

  h1.title{
    font-family:'Poppins', sans-serif; font-weight: 900;
    font-size: clamp(1.9rem, 6.2vw, 3.1rem);
    line-height: 1.12; letter-spacing: -0.01em;
    margin-bottom: 8px;
    opacity:0; animation: fadeUp 0.7s ease 0.15s forwards;
  }
  .title .grad{ background: linear-gradient(100deg, #3FA9F5, var(--orange)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .subtitle-cab{
    font-family:'Poppins', sans-serif; font-weight:600; font-size: clamp(1rem,2.6vw,1.25rem);
    color: rgba(255,255,255,0.75); margin-bottom: 30px;
    opacity:0; animation: fadeUp 0.7s ease 0.22s forwards;
  }

  .hook{
    font-size: clamp(1.05rem, 2.6vw, 1.25rem); line-height:1.5; color: rgba(255,255,255,0.92);
    margin-bottom: 6px; font-weight:500;
    opacity:0; animation: fadeUp 0.7s ease 0.3s forwards;
  }
  .rejoignez{
    font-family:'Poppins', sans-serif; font-weight:900; font-size: clamp(1.6rem, 4.6vw, 2.1rem);
    margin: 18px 0 30px; color: var(--orange);
    opacity:0; animation: fadeUp 0.7s ease 0.4s forwards;
  }

  .hero-actions{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; opacity:0; animation: fadeUp 0.7s ease 0.5s forwards; }
  .btn-primary{
    background: var(--orange); color: #fff; border:none; font-weight:700; font-family:'Poppins',sans-serif;
    padding: 15px 30px; border-radius: 40px; font-size:0.98rem; cursor:pointer;
    box-shadow: 0 10px 26px rgba(241,129,15,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .btn-primary:hover{ transform: translateY(-3px); }
  .btn-ghost{
    background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.4);
    padding: 15px 26px; border-radius: 40px; font-size:0.95rem; font-weight:600; cursor:pointer;
    transition: all 0.2s ease;
  }
  .btn-ghost:hover{ border-color: var(--blue); background: rgba(11,135,220,0.12); }

  .scroll-hint{ position:absolute; bottom:26px; left:50%; transform:translateX(-50%); z-index:1; width:22px; height:36px; border:1.5px solid rgba(255,255,255,0.5); border-radius: 20px; }
  .scroll-hint::before{ content:''; position:absolute; top:6px; left:50%; transform:translateX(-50%); width:4px; height:8px; background:#fff; border-radius:2px; animation: scrolldown 1.6s ease infinite; }
  @keyframes scrolldown{ 0%{ opacity:1; transform: translate(-50%,0); } 100%{ opacity:0; transform: translate(-50%,14px); } }

  @keyframes fadeUp{ from{ opacity:0; transform: translateY(16px); } to{ opacity:1; transform: translateY(0); } }

  /* ---------- SHARED ---------- */
  .section-eyebrow{
    display:flex; align-items:center; justify-content:center; gap:10px;
    text-align:center; font-size:13.5px; font-weight:800; letter-spacing:0.16em; text-transform:uppercase;
    color: var(--blue); margin-bottom:16px;
  }
  .section-eyebrow::before, .section-eyebrow::after{
    content:''; width: 26px; height: 2px; background: linear-gradient(90deg, transparent, var(--orange)); border-radius:2px;
  }
  .section-eyebrow::after{ background: linear-gradient(90deg, var(--orange), transparent); }

  .section-title{
    position:relative;
    font-family:'Poppins', sans-serif; font-weight:900;
    font-size: clamp(2.1rem, 6.4vw, 3.2rem);
    line-height:1.12;
    letter-spacing:-0.01em;
    text-align:center; margin-bottom: 54px;
  }
  .section-title .u1{ position:relative; display:inline-block; }
  .section-title .u1::after{
    content:''; position:absolute; left:2%; right:2%; bottom:-6px; height:10px;
    background: rgba(11,135,220,0.18); border-radius: 6px; z-index:-1;
  }
  .section-title .u2{ position:relative; display:inline-block; }
  .section-title .u2::after{
    content:''; position:absolute; left:2%; right:2%; bottom:-6px; height:10px;
    background: rgba(241,129,15,0.22); border-radius: 6px; z-index:-1;
  }
  .title-accent{
    display:block; width: 64px; height: 4px; margin: 18px auto 0;
    background: linear-gradient(90deg, var(--blue), var(--orange));
    border-radius: 4px;
  }

  .reveal-el{ opacity:0; transform: translateY(26px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal-el.in{ opacity:1; transform: translateY(0); }

  .icon-badge{
    width:52px; height:52px; border-radius: 14px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition: transform 0.3s ease;
  }
  .icon-badge.blue-bg{ background: rgba(11,135,220,0.1); }
  .icon-badge.orange-bg{ background: rgba(241,129,15,0.1); }
  .icon-badge.navy-bg{ background: rgba(10,24,48,0.08); }

  /* ---------- INTRO BOX ---------- */
  .intro{ max-width: 760px; margin: 70px auto 0; padding: 0 24px; }
  .intro-box{
    background: var(--paper); border: 1px solid rgba(10,24,48,0.08); border-radius: 20px;
    padding: 36px 32px; text-align:center;
    box-shadow: 0 10px 30px rgba(10,24,48,0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .intro-box:hover{ transform: translateY(-4px); box-shadow: 0 16px 40px rgba(10,24,48,0.08); }
  .intro-box .icon-badge{ margin: 0 auto 18px; }
  .intro-box p{ font-size: 1.05rem; line-height:1.75; color:#3B4656; }
  .intro-box strong{ color: var(--navy); }

  /* ---------- PROFILS ---------- */
  .profils{ max-width: 940px; margin: 0 auto; padding: 70px 24px; }
  .profil-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  @media (max-width: 720px){ .profil-grid{ grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 480px){ .profil-grid{ grid-template-columns: 1fr; } }

  .profil-item{
    display:flex; flex-direction:column; align-items:flex-start; gap:14px;
    background: var(--white); border: 1px solid rgba(10,24,48,0.09); border-radius: 16px;
    padding: 22px 20px; font-size:0.96rem; font-weight:600;
    box-shadow: 0 4px 14px rgba(10,24,48,0.04);
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  }
  .profil-item:hover{ transform: translateY(-5px); border-color: var(--blue); box-shadow: 0 14px 30px rgba(11,135,220,0.14); }
  .profil-item:hover .icon-badge{ transform: rotate(-8deg) scale(1.08); }
  .profil-item .label{ color: var(--navy); line-height:1.4; }

  /* ---------- PROGRAMS ---------- */
  .programs{ max-width: 940px; margin: 0 auto; padding: 20px 24px 40px; }
  .prog-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 680px){ .prog-grid{ grid-template-columns: 1fr; } }

  .prog-box{
    background: var(--white); border-radius: 22px; padding: 32px 28px;
    box-shadow: 0 10px 30px rgba(10,24,48,0.06);
    border-top: 4px solid var(--blue);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .prog-box.nexela{ border-top-color: var(--orange); }
  .prog-box:hover{ transform: translateY(-6px); box-shadow: 0 20px 44px rgba(10,24,48,0.12); }

  .prog-top{ display:flex; align-items:center; gap:14px; margin-bottom: 18px; }
  .prog-top .icon-badge:hover{ transform: rotate(8deg) scale(1.1); }
  .prog-tag{ font-size: 0.76rem; text-transform:uppercase; letter-spacing:0.08em; color:#8891a0; font-weight:700; margin-bottom:2px; }
  .prog-name{ font-family:'Poppins', sans-serif; font-weight: 800; font-size: 1.25rem; }
  .prog-box.orela .prog-name{ color: var(--blue); }
  .prog-box.nexela .prog-name{ color: var(--orange); }
  .prog-desc{ color:#3B4656; line-height:1.7; font-size: 0.98rem; }

  /* ---------- IMPACT ---------- */
  .impact{ background: var(--navy); color:#fff; text-align:center; padding: 70px 24px; margin-top: 20px; }
  .impact-box{
    max-width: 760px; margin:0 auto; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 44px 36px;
  }
  .impact-box .icon-badge{ margin: 0 auto 20px; background: rgba(241,129,15,0.15); }
  .impact-box p{ font-family:'Poppins', sans-serif; font-weight:600; font-size: clamp(1.05rem, 2.6vw, 1.35rem); line-height:1.6; }
  .impact .hl-blue{ color: #3FA9F5; }
  .impact .hl-orange{ color: var(--orange); }

  /* ---------- LOCATION ---------- */
  .location-wrap{ display:flex; justify-content:center; padding: 50px 24px; }
  .location-box{
    display:flex; align-items:flex-start; gap:16px;
    background: var(--paper); border: 1px solid rgba(10,24,48,0.08); border-radius: 18px;
    padding: 22px 28px; font-size: 1rem; font-weight:600; color: var(--navy);
    box-shadow: 0 10px 26px rgba(10,24,48,0.05);
    transition: transform 0.25s ease;
    max-width: 520px; text-align:left;
  }
  .location-box .loc-title{ margin-bottom: 4px; }
  .location-box .loc-detail{ font-weight:500; font-size:0.9rem; color:#5a6472; line-height:1.5; }
  .location-box:hover{ transform: translateY(-3px); }

  /* ---------- FORM ---------- */
  .form-section{ padding: 40px 20px 90px; background: var(--paper); }
  .form-wrap{ max-width: 600px; margin: 0 auto; }

  .panel{ background: var(--white); border: 1px solid rgba(10,24,48,0.08); border-radius: 20px; padding: 34px 28px; box-shadow: 0 20px 50px rgba(10,24,48,0.08); }
  .panel-title{ font-family:'Poppins', sans-serif; font-weight:800; font-size: 1.35rem; text-align:center; margin-bottom: 6px; }
  .panel-sub{ text-align:center; color: #5a6472; font-size:0.92rem; margin-bottom: 18px; }

  .progress-track{ height: 6px; background: #EEF1F5; border-radius: 10px; overflow:hidden; margin-bottom: 28px; }
  .progress-fill{ height:100%; background: linear-gradient(90deg, var(--blue), var(--orange)); border-radius: 10px; transition: width 0.4s ease; }

  .field{ margin-bottom: 22px; }
  label.q{ display:flex; align-items:center; gap: 8px; font-family:'Poppins', sans-serif; font-weight: 600; font-size: 0.96rem; margin-bottom: 9px; }
  label.q .field-icon{ display:inline-flex; color: var(--orange); }
  label.q .field-icon svg{ display:block; }
  .req{ color: var(--orange); font-weight:700; }

  .input-wrap{ position:relative; }
  .input-wrap .field-emoji{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color: #9AA5B1; pointer-events:none; display:flex;
  }
  .input-wrap input[type=text]{ padding-left: 42px; }
  .input-wrap input:focus ~ .field-emoji, .input-wrap:focus-within .field-emoji{ color: var(--blue); }

  input[type=text], textarea{
    width:100%; padding: 12px 14px; border: 1.5px solid #E2E7ED; border-radius: 10px;
    background: #F7F9FC; font-family:'Inter', sans-serif; font-size: 0.95rem; color: var(--navy);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus, textarea:focus{ outline:none; border-color: var(--blue); box-shadow: 0 0 0 4px rgba(11,135,220,0.12); }
  textarea{ min-height: 74px; resize:vertical; }
  .char-count{ font-size: 0.76rem; color:#8891a0; text-align:right; margin-top: 5px; }

  /* tile selector (tranche / format préféré) */
  .tile-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .tile-grid-3{ grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 380px){ .tile-grid-3{ grid-template-columns: repeat(2,1fr); } }
  .tile{
    display:flex; flex-direction:column; align-items:center; gap:8px;
    padding: 16px 10px; border: 1.5px solid #E2E7ED; border-radius: 14px;
    background: #F7F9FC; cursor:pointer; text-align:center;
    transition: all 0.18s ease;
  }
  .tile:hover{ border-color: var(--blue); transform: translateY(-2px); }
  .tile.sel{ border-color: var(--orange); background: #FFF3E8; box-shadow: 0 6px 16px rgba(241,129,15,0.18); }
  .tile-icon{ color: var(--blue); display:flex; }
  .tile.sel .tile-icon{ color: var(--orange); }
  .tile-label{ font-size: 0.85rem; font-weight:600; color: var(--navy); }

  .options{ display:flex; flex-wrap:wrap; gap: 9px; }
  .chip{
    border: 1.5px solid #E2E7ED; background: #F7F9FC; padding: 9px 15px; border-radius: 30px;
    font-size: 0.88rem; font-weight:500; cursor:pointer; transition: all 0.15s ease;
    display:flex; align-items:center; gap:8px; color: var(--navy);
  }
  .chip svg{ flex-shrink:0; color: var(--blue); transition: color 0.15s ease; }
  .chip:hover{ border-color: var(--blue); transform: translateY(-1px); }
  .chip.sel{ background: var(--blue); border-color: var(--blue); color:#fff; }
  .chip.sel svg{ color:#fff; }
  .chip .check{ display:none; font-size:0.8rem; }
  .chip.sel .check{ display:inline; animation: checkPop 0.25s ease; }
  @keyframes checkPop{ from{ transform:scale(0); } to{ transform:scale(1); } }

  .hint{ font-size: 0.78rem; color:#8891a0; margin-top: 7px; }

  .form-error{
    background: #FDECEC; border: 1px solid #F5C2C2; color: #B23A3A;
    padding: 12px 16px; border-radius: 10px; font-size: 0.88rem; margin-bottom: 20px;
    text-align:center;
  }

  button.submit{
    width:100%; background: var(--orange); color: #fff; border:none; padding: 16px;
    border-radius: 12px; font-family:'Poppins', sans-serif; font-weight:800; font-size: 1rem;
    cursor:pointer; margin-top: 8px; transition: transform 0.15s ease;
    box-shadow: 0 8px 20px rgba(241,129,15,0.3);
  }
  button.submit:hover{ transform: translateY(-2px); }
  button.submit:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .success{ text-align:center; padding: 30px 10px; }
  .success .mark{ width:60px; height:60px; border-radius:50%; background: #E8F3FC; color: var(--blue); font-size:1.7rem; display:flex; align-items:center; justify-content:center; margin: 0 auto 16px; animation: pop 0.4s ease; }
  @keyframes pop{ 0%{transform:scale(0);} 70%{transform:scale(1.15);} 100%{transform:scale(1);} }
  .success h2{ font-family:'Poppins', sans-serif; font-size: 1.3rem; margin-bottom: 8px; }
  .success p{ color:#5a6472; max-width: 40ch; margin: 0 auto; }

  .admin-toggle{ text-align:center; margin-top: 26px; font-size: 0.82rem; color: #8891a0; }
  .admin-link-btn{
    background:none; border:none; padding:4px; color: var(--blue); cursor:pointer;
    text-decoration: underline; font-weight:600; font-size: inherit; font-family: inherit;
  }

  .resp-card{ background: var(--white); border: 1px solid rgba(10,24,48,0.08); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
  .resp-card .name{ font-family:'Poppins', sans-serif; font-weight:700; font-size:1rem; }
  .resp-card .meta{ font-size: 0.82rem; color:#5a6472; margin: 4px 0 10px; }
  .resp-card .tags{ display:flex; flex-wrap:wrap; gap:6px; margin: 8px 0; }
  .resp-card .tag{ background: #E8F3FC; color: var(--blue); font-size: 0.75rem; font-weight:600; padding: 4px 11px; border-radius: 20px; }
  .resp-card .note{ font-size: 0.88rem; margin-top: 8px; color:#5a6472; }
  .empty{ text-align:center; color: #8891a0; padding: 40px 0; font-size:0.95rem; }
  .back-link{ background:none; border:none; padding:4px; font-size:0.85rem; color:var(--blue); cursor:pointer; text-decoration:underline; font-weight:600; font-family: inherit; }

  footer{ background: var(--navy); color: rgba(255,255,255,0.6); text-align:center; padding: 28px 20px; font-size: 0.85rem; }
  footer strong{ color:#fff; }

  /* ---------- ACCESS MODAL ---------- */
  .modal-overlay{
    position:fixed; inset:0; background: rgba(10,24,48,0.6);
    display:flex; align-items:center; justify-content:center;
    z-index: 1000; padding: 20px;
    opacity:0; animation: modalFade 0.2s ease forwards;
  }
  @keyframes modalFade{ to{ opacity:1; } }
  .modal-box{
    background: #fff; border-radius: 20px; padding: 32px 26px; max-width: 380px; width:100%;
    box-shadow: 0 30px 70px rgba(0,0,0,0.35);
    transform: translateY(10px); opacity:0; animation: modalPop 0.25s ease 0.05s forwards;
  }
  @keyframes modalPop{ to{ transform: translateY(0); opacity:1; } }
  .modal-box .icon-badge{ margin: 0 auto 16px; }
  .modal-box h3{ font-family:'Poppins', sans-serif; font-weight:800; font-size: 1.15rem; text-align:center; margin-bottom: 6px; }
  .modal-box p{ text-align:center; color:#5a6472; font-size:0.88rem; margin-bottom: 20px; }
  .modal-box input{
    width:100%; padding: 13px 14px; border: 1.5px solid #E2E7ED; border-radius: 10px;
    background: #F7F9FC; font-family:'Inter', sans-serif; font-size: 1rem; text-align:center;
    letter-spacing: 0.05em; color: var(--navy); margin-bottom: 14px;
  }
  .modal-box input:focus{ outline:none; border-color: var(--blue); }
  .modal-box .modal-error{ color:#D64545; font-size:0.85rem; text-align:center; margin: -6px 0 12px; display:none; }
  .modal-box .modal-actions{ display:flex; gap:10px; }
  .modal-box button{
    flex:1; padding: 12px; border-radius: 10px; font-family:'Poppins', sans-serif; font-weight:700;
    font-size: 0.92rem; cursor:pointer; border:none; transition: transform 0.15s ease;
  }
  .modal-box .btn-cancel{ background:#F0F2F5; color: var(--navy); }
  .modal-box .btn-confirm{ background: var(--orange); color:#fff; }
  .modal-box button:hover{ transform: translateY(-2px); }
</style>
</head>

<script>
const STORAGE_PREFIX = 'eductech-sondage-v5:';
const ADMIN_CODE = 'EDUC20TECH26';

const state = {
  view: 'form',
  submitting: false,
  formError: '',
  values: { nom:'', contact:'', tranche:'', domaines:[], domaineAutre:'', formats:[], modalite:'', themes:'', dispo:'' }
};

function toggleChip(arr,val){ const i=arr.indexOf(val); if(i>=0) arr.splice(i,1); else arr.push(val); render(); }
function setVal(key,val){ state.values[key]=val; }

async function submitForm(e){
  if(e && e.preventDefault) e.preventDefault();
  if(state.submitting) return;
  if(!state.values.nom || !state.values.contact || !state.values.tranche || state.values.domaines.length===0){
    state.formError = "Merci de remplir au minimum : nom, contact, tranche d'âge et au moins un domaine.";
    render();
    return;
  }
  state.formError = '';
  state.submitting = true; render();
  try{
    const v = state.values;
    const payload = {
      nom: v.nom,
      contact: v.contact,
      tranche: v.tranche,
      domaines: v.domaines.join(', '),
      domaine_autre: v.domaineAutre || '',
      programmes: v.formats.join(', '),
      modalite: v.modalite,
      themes: v.themes,
      disponibilite: v.dispo,
      _subject: 'Nouvelle réponse — Sondage EducTech Consulting'
    };
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 15000));
    const response = await Promise.race([
      fetch('https://formspree.io/f/xpqvzbgr', {
        method: 'POST',
        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }),
      timeout
    ]);
    if(response.ok){
      state.view = 'success';
    } else {
      state.formError = "L'envoi a échoué (réponse du serveur invalide). Merci de réessayer.";
    }
  }catch(err){
    console.error(err);
    state.formError = (err && err.message === 'timeout')
      ? "L'envoi n'a pas répondu à temps. Vérifiez votre connexion et réessayez."
      : "Une erreur est survenue lors de l'envoi. Merci de réessayer.";
  }
  state.submitting = false; render();
}

function showAccessModal(){
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'accessModalOverlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="icon-badge orange-bg" style="width:48px;height:48px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" fill="#F1810F"/><path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#F1810F" stroke-width="2" fill="none"/></svg>
      </div>
      <h3>Espace organisateur</h3>
      <p>Entrez le code d'accès pour voir les réponses.</p>
      <input type="text" id="accessCodeInput" placeholder="Code d'accès" autocomplete="off" />
      <div class="modal-error" id="accessCodeError">Code incorrect. Réessayez.</div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeAccessModal()">Annuler</button>
        <button class="btn-confirm" onclick="checkAccessCode()">Valider</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = document.getElementById('accessCodeInput');
  input.focus();
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') checkAccessCode(); });
}

window.closeAccessModal = function(){
  const overlay = document.getElementById('accessModalOverlay');
  if(overlay) overlay.remove();
};

window.checkAccessCode = function(){
  const input = document.getElementById('accessCodeInput');
  const errorEl = document.getElementById('accessCodeError');
  const entered = (input.value || '').trim();
  if(entered !== ADMIN_CODE){
    errorEl.style.display = 'block';
    input.style.borderColor = '#D64545';
    input.value = '';
    input.focus();
    return;
  }
  closeAccessModal();
  loadAdmin();
};

async function loadAdmin(){
  state.view='admin'; state.adminData=null; state.adminError=''; render();
  try{
    const timeout = (ms)=> new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));
    const list = await Promise.race([window.storage.list(STORAGE_PREFIX, true), timeout(10000)]);
    const keys = (list && list.keys) || [];
    const items = [];
    for(const k of keys){ try{ const r = await window.storage.get(k, true); if(r) items.push(JSON.parse(r.value)); }catch(e){} }
    items.sort((a,b)=> new Date(b.submittedAt)-new Date(a.submittedAt));
    state.adminData = items;
  }catch(e){
    state.adminData = [];
    state.adminError = (e && e.message==='timeout')
      ? "Le chargement n'a pas répondu. Le stockage des réponses nécessite un compte Claude en forfait Pro, Max, Team ou Enterprise."
      : "Impossible de charger les réponses pour le moment.";
  }
  render();
}

function chipGroup(key, options){
  return `<div class="options">${options.map(o=>{
    const label = Array.isArray(o) ? o[0] : o;
    const emoji = Array.isArray(o) ? o[1] : '';
    const sel = state.values[key].includes(label);
    return `<div class="chip ${sel?'sel':''}" onclick="window.__toggle('${key}','${label.replace(/'/g,"\\'")}')">${emoji?`<span>${emoji}</span>`:''}${label}<span class="check">✓</span></div>`;
  }).join('')}</div>`;
}

function formProgress(v){
  const fields = [
    !!v.nom, !!v.contact, !!v.tranche, v.domaines.length>0,
    v.formats.length>0, !!v.modalite, !!v.themes, !!v.dispo
  ];
  const filled = fields.filter(Boolean).length;
  return Math.round((filled / fields.length) * 100);
}

window.__toggle=function(key,val){ toggleChip(state.values[key],val); };
window.__setNom=function(v){ setVal('nom',v); };
window.__setContact=function(v){ setVal('contact',v); };
window.__setTranche=function(v){ setVal('tranche',v); render(); };
window.__setDomaineAutre=function(v){ setVal('domaineAutre',v); };
window.__setModalite=function(v){ setVal('modalite',v); render(); };
window.__setThemes=function(v){ setVal('themes',v); };
window.__setDispo=function(v){ setVal('dispo',v); };
window.__scrollTo=function(id){ const el=document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth'}); };

function renderAdmin(){
  if(state.adminData === null){
    return `<div class="form-section"><div class="form-wrap"><div class="panel"><div class="empty">Chargement des réponses…</div></div></div></div>`;
  }
  const items = state.adminData;
  return `
  <section class="hero" style="min-height:44vh;">
    <div class="hero-bg"></div>
    <div class="hero-inner">
      <div class="eyebrow"><span class="dot"></span>Espace organisateur</div>
      <h1 class="title" style="font-size:1.8rem;">Réponses reçues</h1>
      <p style="color:rgba(255,255,255,0.8);">${items.length} réponse${items.length>1?'s':''} au total.</p>
    </div>
  </section>
  <div class="form-section">
    <div class="form-wrap">
      ${state.adminError ? `<div class="form-error">${state.adminError}</div>` : ''}
      ${items.length===0 ? `<div class="panel"><div class="empty">Aucune réponse pour l'instant.</div></div>` : items.map(it=>`
        <div class="resp-card">
          <div class="name">${it.nom||'—'}</div>
          <div class="meta">${it.contact||''} · ${it.tranche||''} · ${new Date(it.submittedAt).toLocaleString('fr-FR')}</div>
          <div class="tags">
            ${(it.domaines||[]).map(d=>`<span class="tag">${d}</span>`).join('')}
            ${(it.formats||[]).map(f=>`<span class="tag">${f}</span>`).join('')}
            ${it.modalite?`<span class="tag">${it.modalite}</span>`:''}
          </div>
          ${it.themes?`<div class="note"><strong>Thèmes :</strong> ${it.themes}</div>`:''}
          ${it.dispo?`<div class="note"><strong>Disponibilité :</strong> ${it.dispo}</div>`:''}
        </div>
      `).join('')}
      <div style="margin-top:20px; text-align:center;"><button type="button" class="back-link" id="backToFormBtn">← Retour au formulaire</button></div>
    </div>
  </div>
  `;
}

function setupScrollReveal(){
  const els = document.querySelectorAll('.reveal-el');
  if(!('IntersectionObserver' in window)){ els.forEach(c=>c.classList.add('in')); return; }
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach((entry)=>{ if(entry.isIntersecting){ entry.target.classList.add('in'); obs.unobserve(entry.target); } });
  }, { threshold:0.12 });
  els.forEach(c=>obs.observe(c));
}

function attachRobustListeners(){
  const viewBtn = document.getElementById('viewResponsesBtn');
  if(viewBtn){
    viewBtn.addEventListener('click', showAccessModal);
    viewBtn.addEventListener('touchend', function(e){ e.preventDefault(); showAccessModal(); });
  }
  const backBtn = document.getElementById('backToFormBtn');
  if(backBtn){
    const goBack = ()=>{ state.view='form'; render(); };
    backBtn.addEventListener('click', goBack);
    backBtn.addEventListener('touchend', function(e){ e.preventDefault(); goBack(); });
  }
  const form = document.getElementById('mainForm');
  if(form){
    form.addEventListener('submit', submitForm);
  }
  const submitBtn = document.getElementById('submitBtn');
  if(submitBtn){
    submitBtn.addEventListener('click', submitForm);
    submitBtn.addEventListener('touchend', function(e){ e.preventDefault(); submitForm(e); });
  }
}

function render(){
  const app = document.getElementById('app');
  if(state.view==='form') app.innerHTML = renderForm();
  else if(state.view==='success') app.innerHTML = renderSuccess();
  else if(state.view==='admin') app.innerHTML = renderAdmin();
  const foot = document.createElement('footer');
  foot.innerHTML = "<strong>EducTech Consulting</strong> — L'innovation au service de l'éducation · N'Djaména, Tchad";
  app.appendChild(foot);
  setupScrollReveal();
  attachRobustListeners();
}

render();
</script>
</body>
</html>
